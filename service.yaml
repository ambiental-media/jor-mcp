# =============================================================================
# Jor-MCP — Cloud Run Service Manifest
# =============================================================================

apiVersion: serving.knative.dev/v1
kind: Service

metadata:
  name: jor-mcp-server
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: internal-and-cloud-load-balancing

spec:
  template:
    metadata:
      annotations:
        # ── Auto-scaling ──────────────────────────────────────────────────────
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"

        # ── Secret Manager — lookup names → resource IDs ──────────────────────
        run.googleapis.com/secrets: "mcp-github-token:projects/${GCP_PROJECT_NUMBER}/secrets/MCP_GITHUB_TOKEN,jwt-secret:projects/${GCP_PROJECT_NUMBER}/secrets/JWT_SECRET"
    spec:
      # ← Service account configured with the actual GCP value
      serviceAccountName: 959918358302-compute@developer.gserviceaccount.com

      containers:
        - image: ${IMAGE_URL}

          ports:
            - name: http1
              containerPort: 8080

          resources:
            limits:
              cpu: "1"
              memory: 512Mi

          env:
            # ── Plain-text variables ─────────────────────────────────────────────
            - name: LOG_LEVEL
              value: "INFO"
            - name: FIREBASE_PROJECT_ID
              value: "${FIREBASE_PROJECT_ID}"
            - name: WORDPRESS_API_URL
              value: "${WORDPRESS_API_URL}"
            - name: MCP_GITHUB_REPOS
              value: "${MCP_GITHUB_REPOS}"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "${OTEL_EXPORTER_OTLP_ENDPOINT}"
            - name: FIREBASE_WEB_API_KEY
              value: "${FIREBASE_WEB_API_KEY}"

            # ── Secrets via Secret Manager ───────────────────────────────────
            - name: MCP_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mcp-github-token
                  key: latest
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: latest

  traffic:
    - percent: 100
      latestRevision: true