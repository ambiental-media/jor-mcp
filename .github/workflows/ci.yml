name: CI

on:
  pull_request:

env:
  REGISTRY: us-central1-docker.pkg.dev
  PROJECT_ID: jor-mcp
  REPOSITORY: jor-mcp
  IMAGE: jor-mcp-server

jobs:
  check:
    name: Code Quality & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint (Ruff)
        run: uv run ruff check .

      - name: Format check (Ruff)
        run: uv run ruff format --check .

      - name: Type check (Mypy)
        run: uv run mypy .

      - name: Tests & Coverage (Pytest)
        run: uv run pytest --cov=src --cov-fail-under=90

      - name: SAST (Bandit)
        id: bandit
        run: |
          uv run bandit -c pyproject.toml -r src/ -ll 2>&1 | tee bandit-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Comment Bandit results on PR
        if: steps.bandit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('bandit-output.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚨 Bandit SAST Report\n\`\`\`\n${output}\n\`\`\``
            })

      - name: Fail if Bandit found issues
        if: steps.bandit.outcome == 'failure'
        run: exit 1

      - name: SCA - Dependency audit (pip-audit)
        run: |
          uv export --no-hashes --all-groups -o requirements-ci.txt
          uv run pip-audit -r requirements-ci.txt

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: check

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Decode credentials
        id: decode_si
        run: |
          DECODED_CREDENTIALS="$(echo -n ${{ secrets.GCP_SA_KEY }} | base64 --decode)"
          echo "::add-mask::$DECODED_CREDENTIALS"
          echo "creds=$DECODED_CREDENTIALS" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ steps.decode_si.outputs.creds }}'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:test .

      - name: Security scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:test
          format: table
          exit-code: "1"
          severity: CRITICAL

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:test